<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Moto Car Elite BI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            width: 400px;
            padding: 40px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        .login-logo {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .login-logo i {
            width: 48px;
            height: 48px;
            color: var(--accent);
        }

        .login-logo h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--gradient-primary);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
            animation: shake 0.4s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="glass login-card">
        <div class="login-logo">
            <i data-lucide="shield-check"></i>
            <h1 class="brand-name">MOTO<span>CAR</span> <small style="font-size: 0.5em; vertical-align: middle; color: var(--accent);">PRO</small></h1>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>E-mail Corporativo</label>
                <input type="email" id="email" placeholder="diretoria@motocar.com.br" required>
            </div>
            <div class="form-group">
                <label>Senha de Acesso</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Acessar Cockpit</button>
            <p id="errorMsg" class="error-msg">Credenciais inválidas. Tente novamente.</p>
        </form>

        <p style="margin-top: 30px; font-size: 0.75rem; color: var(--text-secondary);">
            Acesso restrito a administradores Moto Car.
        </p>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value.trim();

            // 🛡️ TRAVA DE SEGURANÇA MOTO CAR (Versão Final Igor)
            const isAuthorizedEmail = email.includes('admin') || email.includes('diretoria');
            const masterPass = 'admin123';

            if (isAuthorizedEmail && password === masterPass) {
                localStorage.setItem('motocar_session', 'authenticated');
                window.location.href = 'index.html';
            } else {
                const err = document.getElementById('errorMsg');
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 3000);
            }
        });

        // Auto-focus no campo de email
        window.onload = () => document.getElementById('email').focus();
    </script>
</body>
</html>
