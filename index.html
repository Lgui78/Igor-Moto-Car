<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoCarCF | COCKPIT ELITE</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_conn.js"></script>
    <script>
        // 🔒 GUARD DE SESSÃO — roda antes do corpo renderizar
        (async () => {
            const sb = window._supabaseClient;
            if (!sb) return;
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                window.location.replace('./login.html');
            }
        })();
    </script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Dinâmica -->
        <aside class="sidebar">
            <div class="logo-section">
                <i data-lucide="zap" style="color: var(--accent); width: 32px; height: 32px;"></i>
                <h1 class="brand-name">MotoCar<span>CF</span></h1>
            </div>
            
            <nav class="main-nav">
                <a href="#" class="nav-item active" data-title="Visão Executiva" onclick="switchPage('executiva')"><i data-lucide="layout-grid"></i> Visão Executiva</a>
                <a href="#" class="nav-item" data-title="DRE Gerencial" onclick="switchPage('dre')"><i data-lucide="activity"></i> DRE Gerencial</a>
                <a href="#" class="nav-item" data-title="Comercial" onclick="switchPage('comercial')"><i data-lucide="bar-chart-4"></i> Comercial</a>
                <a href="#" class="nav-item" data-title="Peças & Acc" onclick="switchPage('pecas')"><i data-lucide="package"></i> Peças & Acc</a>
                <a href="#" class="nav-item" data-title="Despesas" onclick="switchPage('despesas')"><i data-lucide="pie-chart"></i> Despesas</a>
                <a href="#" class="nav-item" data-title="Filiais" onclick="switchPage('filiais')"><i data-lucide="layers"></i> Filiais</a>
                <a href="#" class="nav-item" data-title="Sazonalidade" onclick="switchPage('sazonalidade')"><i data-lucide="calendar-days"></i> Sazonalidade</a>
                <a href="#" class="nav-item" data-title="Orçamento" onclick="switchPage('orcamento')"><i data-lucide="target"></i> Orçamento</a>
                
                <div style="margin-top: auto; padding-top: 16px; border-top: 1px solid var(--glass-border); width:100%;">
                    <a href="import.html" class="nav-item" data-title="Importar Dados" style="background: rgba(249,115,22,0.1); border: 1px solid rgba(249,115,22,0.3); color: var(--accent); font-weight: 700;"><i data-lucide="upload-cloud"></i> <span>⬆ Importar Dados</span></a>
                </div>
            </nav>

            <div class="profile-card">
                <div class="avatar" id="userAvatar">--</div>
                <div class="user-info">
                    <p class="user-name" id="userName">Carregando...</p>
                    <p class="user-role" id="userRole">MotoCarCF</p>
                </div>
                <button onclick="logout()" class="logout-btn" title="Sair do Cockpit">
                    <i data-lucide="log-out"></i>
                </button>
            </div>
        </aside>

        <!-- Dynamic Main Surface -->
        <main class="main-content">
            <header class="top-header">
                <div class="top-header-row">
                    <div class="page-title">
                        <h2 id="currentPageTitle">Visão Executiva</h2>
                        <p id="currentPageDesc">Consolidado de Performance do Grupo</p>
                    </div>
                    <div class="header-actions">
                        <div class="header-controls glass-controls">
                            <button class="icon-btn-text" onclick="exportData('PDF')">⬇ PDF</button>
                            <button class="icon-btn-text" onclick="exportData('XLSX')">⬇ EXCEL</button>
                        </div>
                        <div class="header-controls glass-controls">
                            <select id="filtroFilial" onchange="switchPage(window.currentPage || 'executiva')">
                                <option value="todas">Grupo Consolidado</option>
                                <option value="centro">Filial Centro</option>
                                <option value="norte">Filial Norte</option>
                                <option value="sul">Filial Sul</option>
                            </select>
                            <select id="filtroData" onchange="switchPage(window.currentPage || 'executiva')">
                                <option value="2026">2026</option>
                                <option value="2025">2025</option>
                                <option value="2024">2024</option>
                            </select>
                        </div>
                    </div>
                </div>
                <!-- 🗓️ Month Pill Strip - Estilo BI Premium -->
                <div class="month-strip" id="monthStrip">
                    <button class="month-pill" onclick="selectMes(1,this)">JAN</button>
                    <button class="month-pill" onclick="selectMes(2,this)">FEV</button>
                    <button class="month-pill active" onclick="selectMes(3,this)">MAR</button>
                    <button class="month-pill" onclick="selectMes(4,this)">ABR</button>
                    <button class="month-pill" onclick="selectMes(5,this)">MAI</button>
                    <button class="month-pill" onclick="selectMes(6,this)">JUN</button>
                    <button class="month-pill" onclick="selectMes(7,this)">JUL</button>
                    <button class="month-pill" onclick="selectMes(8,this)">AGO</button>
                    <button class="month-pill" onclick="selectMes(9,this)">SET</button>
                    <button class="month-pill" onclick="selectMes(10,this)">OUT</button>
                    <button class="month-pill" onclick="selectMes(11,this)">NOV</button>
                    <button class="month-pill" onclick="selectMes(12,this)">DEZ</button>
                    <input type="hidden" id="filtroMes" value="3">
                </div>
            </header>

            <!-- Container Dinâmico das Páginas -->
            <div id="pageContainer">
                <!-- Conteúdo será injetado pelo JavaScript -->
            </div>
        </main>
    </div>

    <!-- 📊 Painel de Participação de Filiais (Fase 1) -->
    <div id="sideParticipationPanel" class="participation-overlay">
        <div class="participation-content glass scale-in">
            <div class="panel-header">
                <h3 style="font-weight: 800; letter-spacing: -0.5px;">ANÁLISE DE SHARE</h3>
                <button onclick="closeParticipation()" class="icon-btn"><i data-lucide="x"></i></button>
            </div>
            <div class="panel-body">
                <div id="participationList" class="participation-list">
                    <!-- Dinâmico via JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Overlay de Drill-through (Passo 7) -->
    <div id="detailOverlay" class="detail-overlay glass">
        <div class="overlay-content">
            <header class="overlay-header">
                <h2 id="detailTitle">Detalhes do Item</h2>
                <button class="icon-btn" onclick="closeDetails()"><i data-lucide="x"></i></button>
            </header>
            <div id="detailBody" class="overlay-body">
                <!-- Conteúdo detalhado aqui -->
            </div>
        </div>
    </div>

    <!-- Scripts de Controle -->
    <script src="dashboard_logic.js"></script>
    <script>
        lucide.createIcons();

        // Preenche o perfil com o usuário logado
        (async () => {
            const sb = window._supabaseClient;
            if (!sb) return;
            const { data: { user } } = await sb.auth.getUser();
            if (!user) return;
            const email = user.email || '';
            const name  = user.user_metadata?.full_name || email.split('@')[0];
            const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
            document.getElementById('userAvatar').textContent = initials;
            document.getElementById('userName').textContent   = name;
            document.getElementById('userRole').textContent   = email;
        })();
    </script>
</body>
</html>
